name: Update README experience

on:
  schedule:
    - cron: "17 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-experience:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update experience years
        run: node scripts/update-experience.js

      - name: Commit README update
        run: |
          if git diff --quiet; then
            echo "No experience update needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile experience"
          git push
